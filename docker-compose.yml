version: "3.9"

services:
  stt:
    build: ./stt
    ports:
      - "8000:8000"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - STT_MAX_CONCURRENT=${STT_MAX_CONCURRENT:-2}
      - STT_TIMESTAMPS=${STT_TIMESTAMPS:-segments}
    volumes:
      - whisper-cache:/root/.cache
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8787:8787"
    environment:
      - STT_URL=http://stt:8000
      - PORT=8787
    depends_on:
      - stt
    restart: unless-stopped

volumes:
  whisper-cache:
